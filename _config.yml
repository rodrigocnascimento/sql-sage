title: SQL Sage Documentation
description: Developer documentation for SQL Sage
remote_theme: just-the-docs/just-the-docs
color_scheme: light
search_enabled: true
mermaid: true

plugins:
  - jekyll-remote-theme

just_the_docs:
  custom_css:
    - assets/css/overrides.css

ga_tracking: G-RK202LXFM2
ga_tracking_anonymize_ip: true

aux_links:
  Repository:
    - "{{ site.github.repository_url }}"

footer_content: "SQL Sage documentation"

exclude:
  - AGENTS.md
  - specs
  - data
  - dist
  - models
  - node_modules
  - coverage
  - scripts
  - src
  - .sqlsage
  - package-lock.json
